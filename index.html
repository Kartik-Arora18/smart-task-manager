<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <button id="theme-btn" title="Toggle dark mode">🌙</button>
  <h1>✅ Smart Task Manager</h1>
  <p>Stay organised. Get things done.</p>
</header>

<div class="container">

  <!-- Counters -->
  <div class="card">
    <div class="counters">
      <div class="counter-box">
        <div class="num" id="count-total">0</div>
        <div class="lbl">Total</div>
      </div>
      <div class="counter-box">
        <div class="num count-yellow" id="count-pending">0</div>
        <div class="lbl">Pending</div>
      </div>
      <div class="counter-box">
        <div class="num count-green" id="count-completed">0</div>
        <div class="lbl">Done</div>
      </div>
    </div>
  </div>

  <!-- Add Task Form -->
  <div class="card">
    <div class="form-grid">
      <input type="text" id="task-input" placeholder="What needs to be done?" class="full" />
      <select id="priority-select">
        <option value="medium">⚡ Medium Priority</option>
        <option value="high">🔴 High Priority</option>
        <option value="low">🟢 Low Priority</option>
      </select>
      <input type="date" id="due-date" />
      <button id="add-btn" class="full">+ Add Task</button>
    </div>
  </div>

  <!-- Search -->
  <div class="card">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search tasks…" />
    </div>
  </div>

  <!-- Pending Tasks -->
  <div class="card">
    <div class="section-title">
      <span class="dot dot-pending"></span> Pending Tasks
    </div>
    <div class="task-list" id="pending-list"></div>
  </div>

  <!-- Completed Tasks -->
  <div class="card">
    <div class="section-title">
      <span class="dot dot-completed"></span> Completed Tasks
    </div>
    <div class="task-list" id="completed-list"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
